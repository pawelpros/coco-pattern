{{- if .Values.enabled }}
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
  annotations:
    argocd.argoproj.io/sync-wave: "110"
spec:
  operator:
    defaultRuntime: crio
    runtimeClass: nvidia
    use_ocp_driver_toolkit: true

  daemonsets:
    rollingUpdate:
      maxUnavailable: "1"
    updateStrategy: RollingUpdate

  driver:
    enabled: true
    useNvidiaDriverCRD: false
    kernelModuleType: auto
    licensingConfig:
      nlsEnabled: true
      secretName: ""
    certConfig:
      name: ""
    kernelModuleConfig:
      name: ""
    repoConfig:
      configMapName: ""
    virtualTopology:
      config: ""
    upgradePolicy:
      autoUpgrade: true
      maxParallelUpgrades: 1
      maxUnavailable: 25%
      drain:
        deleteEmptyDir: false
        enable: false
        force: false
        timeoutSeconds: 300
      podDeletion:
        deleteEmptyDir: false
        force: false
        timeoutSeconds: 300
      waitForCompletion:
        timeoutSeconds: 0

  devicePlugin:
    enabled: false
    config:
      name: ""
      default: ""
    mps:
      root: /run/nvidia/mps

  dcgm:
    enabled: true

  dcgmExporter:
    enabled: true
    config:
      name: ""
    serviceMonitor:
      enabled: true

  gfd:
    enabled: true

  nodeStatusExporter:
    enabled: true

  toolkit:
    enabled: true
    installDir: /usr/local/nvidia

  validator:
    plugin:
      env: []

  sandboxWorkloads:
    enabled: true
    mode: kata
    defaultWorkload: vm-passthrough

  kataManager:
    enabled: false
    config:
      artifactsDir: /opt/nvidia-gpu-operator/artifacts/runtimeclasses

  ccManager:
    enabled: {{ .Values.ccManager.enabled }}
    defaultMode: {{ .Values.ccManager.defaultMode | quote }}
    repository: nvcr.io/nvidia/cloud-native
    image: k8s-cc-manager
    version: v0.1.0
    env:
      - name: CC_CAPABLE_DEVICE_IDS
        value: {{ .Values.ccManager.deviceIDs | quote }}

  kataSandboxDevicePlugin:
    enabled: {{ .Values.kataSandboxDevicePlugin.enabled }}
    repository: {{ .Values.kataSandboxDevicePlugin.repository }}
    image: {{ .Values.kataSandboxDevicePlugin.image }}
    version: {{ .Values.kataSandboxDevicePlugin.version | quote }}

  sandboxDevicePlugin:
    enabled: true

  vfioManager:
    enabled: true

  vgpuManager:
    enabled: false

  vgpuDeviceManager:
    enabled: true
    config:
      default: default

  gdrcopy:
    enabled: false

  gds:
    enabled: false

  mig:
    strategy: single

  migManager:
    enabled: true
    config:
      default: all-disabled

  cdi:
    default: false
    enabled: true
    nriPluginEnabled: false

  nfd:
    nodefeaturerules: true
{{- end }}
